name: Build APRS Net Android

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > aprs-net-release.jks

      - name: Build release AAB
        run: |
          ./gradlew bundleRelease --no-daemon --stacktrace \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/aprs-net-release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Build debug APK (sideload)
        run: ./gradlew assembleDebug --no-daemon

      - name: Collect outputs
        run: |
          mkdir -p dist
          cp app/build/outputs/bundle/release/app-release.aab \
             dist/APRS-Net-Android.aab
          cp app/build/outputs/apk/debug/app-debug.apk \
             dist/APRS-Net-Android.apk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aprs-net-android
          path: dist/

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/APRS-Net-Android.aab
            dist/APRS-Net-Android.apk
          generate_release_notes: true

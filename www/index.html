<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>APRS Net</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    background:#0f172a; color:#e2e8f0; user-select:none; -webkit-user-select:none; }
  #splash { height:100%; display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:env(safe-area-inset-top) 28px env(safe-area-inset-bottom); }
  .logo { font-size:30px; font-weight:800; color:#38bdf8; letter-spacing:-0.5px; }
  .tag  { font-size:13px; color:#64748b; margin-top:6px; }
  .badge { display:inline-block; margin-top:14px; background:#1e3a5f; border:1px solid #2563eb;
    color:#60a5fa; font-size:11px; font-weight:bold; padding:4px 14px; border-radius:20px; }
  .spin { margin-top:30px; width:30px; height:30px; border:3px solid #1e293b;
    border-top-color:#38bdf8; border-radius:50%; animation:s 0.8s linear infinite; }
  @keyframes s { to { transform:rotate(360deg); } }
  #status { margin-top:18px; font-size:12px; color:#475569; min-height:16px; text-align:center; }
  .card { background:#1e293b; border:1px solid #334155; border-radius:16px;
    padding:26px; width:100%; max-width:380px; margin-top:24px; }
  label { display:block; font-size:12px; color:#94a3b8; margin:10px 0 5px; }
  input { width:100%; background:#0f172a; border:1px solid #334155; border-radius:9px;
    padding:11px 13px; color:#e2e8f0; font-size:15px; outline:none; }
  input:focus { border-color:#38bdf8; }
  .chk { display:flex; align-items:center; gap:9px; margin-top:14px; font-size:13px; color:#94a3b8; }
  .chk input { width:auto; }
  button { width:100%; margin-top:20px; background:linear-gradient(135deg,#2563eb,#0284c7);
    border:none; border-radius:11px; color:#fff; font-size:16px; font-weight:700;
    padding:14px; cursor:pointer; }
  button:active { opacity:0.85; }
  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="splash">
  <div class="logo">APRS Net</div>
  <div class="tag">Advanced APRS Mobile Client</div>
  <div class="badge">www.aprsnet.uk</div>

  <div id="loading">
    <div class="spin"></div>
  </div>

  <div id="setup" class="card hidden">
    <label>Your Callsign</label>
    <input type="text" id="callsign" placeholder="M0ABC" autocapitalize="characters">
    <label>APRS-IS Passcode</label>
    <input type="password" id="passcode" placeholder="12345" inputmode="numeric">
    <label>Member Username (optional)</label>
    <input type="text" id="memberUser" placeholder="account name">
    <label>Member Password (optional)</label>
    <input type="password" id="memberPass" placeholder="password">
    <label class="chk"><input type="checkbox" id="autoConnect" checked> Remember me &amp; connect automatically</label>
    <label class="chk"><input type="checkbox" id="notifications" checked> Message notifications</label>
    <button onclick="connect()">Connect to APRS Net</button>
  </div>

  <div id="status"></div>
</div>

<script src="bridge.js"></script>
</body>
</html>
